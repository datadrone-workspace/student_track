<!DOCTYPE html>
<html>
<head>
  <title>Smart Learning Analytics</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    .progress-bar {
      height: 8px;
      background: #334155;
      margin-top: 10px;
      border-radius: 5px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #22c55e;
      border-radius: 5px;
    }

    canvas {
      max-width: 700px;
      margin: 20px auto;
      display: block;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>📊 Video Completion Analytics</h1>

<!-- CHART -->
<canvas id="myChart"></canvas>

<!-- VIDEOS -->
<div class="container">

  <div class="card">
    <h3>Video 1</h3>
    <video id="video1" controls><source src="video1.mp4"></video>
    <div class="progress-bar"><div id="p1" class="progress"></div></div>
  </div>

  <div class="card">
    <h3>Video 2</h3>
    <video id="video2" controls><source src="video2.mp4"></video>
    <div class="progress-bar"><div id="p2" class="progress"></div></div>
  </div>

  <div class="card">
    <h3>Video 3</h3>
    <video id="video3" controls><source src="video3.mp4"></video>
    <div class="progress-bar"><div id="p3" class="progress"></div></div>
  </div>

  <div class="card">
    <h3>Video 4</h3>
    <video id="video4" controls><source src="video4.mp4"></video>
    <div class="progress-bar"><div id="p4" class="progress"></div></div>
  </div>

</div>

<!-- ✅ SEGMENT (OFFICIAL LONG SNIPPET) -->

<!-- TRACKING + CHART -->
<script>

// USER
analytics.identify("student_1");

// CHART DATA
let videoProgress = {
  "Video 1": 0,
  "Video 2": 0,
  "Video 3": 0,
  "Video 4": 0
};

let chart;

// CREATE CHART
function createChart() {
  chart = new Chart(document.getElementById("myChart"), {
    type: "bar",
    data: {
      labels: Object.keys(videoProgress),
      datasets: [{
        label: "Completion %",
        data: Object.values(videoProgress)
      }]
    },
    options: {
      scales: {
        y: { min: 0, max: 100 }
      }
    }
  });
}

// UPDATE CHART
function updateChart() {
  chart.data.datasets[0].data = Object.values(videoProgress);
  chart.update();
}

// TRACK VIDEO
function trackVideo(videoId, progressId, name) {
  const video = document.getElementById(videoId);
  const progress = document.getElementById(progressId);

  let t10=false, t40=false, t80=false;
  let completed = false;

  video.addEventListener("play", () => {
    analytics.track("Video Started", { video: name });
  });

  video.addEventListener("timeupdate", () => {
    if (!video.duration) return;

    let percent = (video.currentTime / video.duration) * 100;

    progress.style.width = percent + "%";
    videoProgress[name] = Math.round(percent);
    updateChart();

    if (percent >= 10 && !t10) {
      t10 = true;
      analytics.track("Video Watched 10%", { video: name });
    }

    if (percent >= 40 && !t40) {
      t40 = true;
      analytics.track("Video Watched 40%", { video: name });
    }

    if (percent >= 80 && !t80) {
      t80 = true;
      analytics.track("Video Watched 80%", { video: name });
    }
  });

  video.addEventListener("ended", () => {
    completed = true;
    videoProgress[name] = 100;
    analytics.track("Video Completed", { video: name });
    updateChart();
  });

  // 🔥 DROP-OFF USING VISIBILITY CHANGE (BEST)
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {

      if (!video.duration) return;

      let percent = (video.currentTime / video.duration) * 100;

      if (!completed && percent > 0 && percent < 95) {
        analytics.track("Video Dropped Off", {
          video: name,
          percent: Math.round(percent)
        });
      }
    }
  });

}

// APPLY
trackVideo("video1", "p1", "Video 1");
trackVideo("video2", "p2", "Video 2");
trackVideo("video3", "p3", "Video 3");
trackVideo("video4", "p4", "Video 4");

// INIT
createChart();

</script>

</body>
</html>
